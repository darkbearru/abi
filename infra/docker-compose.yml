name: ${COMPOSE_PROJECT_NAME:-ai-book-illustrator}

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-development}
  JWT_SECRET: ${JWT_SECRET:-change-me-use-a-long-random-secret}
  JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-604800}
  AUTH_LOGIN_FAILURE_LIMIT: ${AUTH_LOGIN_FAILURE_LIMIT:-5}
  AUTH_LOGIN_FAILURE_WINDOW_MS: ${AUTH_LOGIN_FAILURE_WINDOW_MS:-900000}
  AUTH_RATE_LIMIT_REDIS_DISABLED: ${AUTH_RATE_LIMIT_REDIS_DISABLED:-false}
  ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
  BOOK_UPLOAD_MAX_BYTES: ${BOOK_UPLOAD_MAX_BYTES:-52428800}
  BOOK_UPLOAD_MAX_FIELD_BYTES: ${BOOK_UPLOAD_MAX_FIELD_BYTES:-4096}
  BOOK_UPLOAD_TEMP_ROOT: ${BOOK_UPLOAD_TEMP_ROOT:-/app/storage/.tmp/uploads}
  BOOK_CHUNK_TARGET_TOKENS: ${BOOK_CHUNK_TARGET_TOKENS:-1800}
  BOOK_CHUNK_OVERLAP_TOKENS: ${BOOK_CHUNK_OVERLAP_TOKENS:-200}
  AI_TEXT_TIMEOUT_MS: ${AI_TEXT_TIMEOUT_MS:-120000}
  CHARACTER_EXTRACTION_AI_PROVIDER: ${CHARACTER_EXTRACTION_AI_PROVIDER:-openai}
  CHARACTER_EXTRACTION_PROMPT_VERSION: ${CHARACTER_EXTRACTION_PROMPT_VERSION:-1.0.0}
  CHARACTER_PASSPORT_IMAGE_PROVIDER: ${CHARACTER_PASSPORT_IMAGE_PROVIDER:-openai}
  CHARACTER_PASSPORT_IMAGE_MODEL: ${CHARACTER_PASSPORT_IMAGE_MODEL:-gpt-image-1}
  CHARACTER_PASSPORT_IMAGE_SIZE: ${CHARACTER_PASSPORT_IMAGE_SIZE:-1024x1024}
  LOCATION_EXTRACTION_AI_PROVIDER: ${LOCATION_EXTRACTION_AI_PROVIDER:-openai}
  LOCATION_EXTRACTION_PROMPT_VERSION: ${LOCATION_EXTRACTION_PROMPT_VERSION:-1.0.0}
  LOCATION_PASSPORT_IMAGE_PROVIDER: ${LOCATION_PASSPORT_IMAGE_PROVIDER:-openai}
  LOCATION_PASSPORT_IMAGE_MODEL: ${LOCATION_PASSPORT_IMAGE_MODEL:-gpt-image-1}
  LOCATION_PASSPORT_IMAGE_SIZE: ${LOCATION_PASSPORT_IMAGE_SIZE:-1024x1024}
  SCENE_IMAGE_PROVIDER: ${SCENE_IMAGE_PROVIDER:-openai}
  SCENE_IMAGE_MODEL: ${SCENE_IMAGE_MODEL:-gpt-image-1}
  SCENE_IMAGE_SIZE: ${SCENE_IMAGE_SIZE:-1024x1024}
  CONSISTENCY_VALIDATION_PROVIDER: ${CONSISTENCY_VALIDATION_PROVIDER:-mock}
  CONSISTENCY_VALIDATION_AI_PROVIDER: ${CONSISTENCY_VALIDATION_AI_PROVIDER:-openai}
  CONSISTENCY_VALIDATION_AI_MODEL: ${CONSISTENCY_VALIDATION_AI_MODEL:-}
  TIMELINE_EXTRACTION_AI_PROVIDER: ${TIMELINE_EXTRACTION_AI_PROVIDER:-openai}
  TIMELINE_EXTRACTION_PROMPT_VERSION: ${TIMELINE_EXTRACTION_PROMPT_VERSION:-1.0.0}
  DATABASE_URL: postgresql://${POSTGRES_USER:-abi}:${POSTGRES_PASSWORD:-abi}@postgres:5432/${POSTGRES_DB:-abi}
  REDIS_URL: redis://redis:6379
  QUEUE_RECOVERY_LIMIT: ${QUEUE_RECOVERY_LIMIT:-100}
  QUEUE_RECOVERY_ON_API_STARTUP: ${QUEUE_RECOVERY_ON_API_STARTUP:-false}
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION_BOOK_KNOWLEDGE: ${QDRANT_COLLECTION_BOOK_KNOWLEDGE:-abi_book_knowledge}
  VECTOR_EMBEDDING_DIMENSIONS: ${VECTOR_EMBEDDING_DIMENSIONS:-256}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-please-change-me}
  STORAGE_ROOT: ${STORAGE_ROOT:-/app/storage}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

x-env-file: &env-file
  - path: ../.env
    required: false

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    env_file: *env-file
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abi}
      POSTGRES_USER: ${POSTGRES_USER:-abi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    env_file: *env-file
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-v1.9.5}
    env_file: *env-file
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:${NEO4J_VERSION:-5-community}
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-please-change-me}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-06-22T05-26-45Z}
    profiles:
      - storage
    env_file: *env-file
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    env_file: *env-file
    environment:
      <<: *app-env
      API_PORT: ${API_PORT:-3000}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    volumes:
      - ${LOCAL_STORAGE_PATH:-../storage}:${STORAGE_ROOT:-/app/storage}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.API_PORT || 3000) + '/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    env_file: *env-file
    environment:
      <<: *app-env
    volumes:
      - ${LOCAL_STORAGE_PATH:-../storage}:${STORAGE_ROOT:-/app/storage}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${WEB_DOCKER_API_BASE_URL:-/backend}
    env_file: *env-file
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_BASE_URL: ${WEB_DOCKER_API_BASE_URL:-/backend}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  minio-data:
